# ─── 로컬 직접 실행 프로파일 ──────────────────────────────────────────────────
# IntelliJ에서 실행 시 자동으로 이 파일이 application.yml에 병합됩니다.
# DB는 docker-compose로 먼저 기동: docker-compose up db

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/crawlerdb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: crawler
    password: crawler1234

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.musinsa: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # SQL 파라미터 값 출력
