spring:
  datasource:
    # docker-compose 환경변수로 주입됨 (로컬 직접 실행 시 아래 값 사용)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crawlerdb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:crawler}
    password: ${SPRING_DATASOURCE_PASSWORD:crawler1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none          # 스키마는 db/init/01_schema.sql 로 관리
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mvc:
    cors:
      allowed-origins: "*"   # 개발용. 운영 시 도메인 명시

server:
  port: 8080

logging:
  level:
    com.musinsa: DEBUG
    org.hibernate.SQL: DEBUG

# AES-256-GCM 암호화 키 (운영 시 환경변수 ENCRYPTION_SECRET_KEY 로 반드시 교체)
encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:ChangeThisSecretKeyInProduction!!}
