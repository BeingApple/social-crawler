services:
  # ──────────────────────────────────────────────
  # 1. MySQL (Aurora MySQL 8.0 호환)
  # ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: crawler-db
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-crawlerdb}
      MYSQL_USER: ${MYSQL_USER:-crawler}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crawler1234}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d   # 초기 DDL 자동 실행
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root1234}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # 2. Python Crawler (배치 서버)
  # ──────────────────────────────────────────────
  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: crawler-python
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-crawlerdb}
      DB_USER: ${MYSQL_USER:-crawler}
      DB_PASSWORD: ${MYSQL_PASSWORD:-crawler1234}
      # 크롤 주기 (초 단위, 기본 1시간)
      CRAWL_INTERVAL_SEC: ${CRAWL_INTERVAL_SEC:-3600}
    volumes:
      - ./crawler/src:/app/src   # 소스 핫리로드 (개발용)

  # ──────────────────────────────────────────────
  # 3. Spring Boot Backend (어드민 API)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crawler-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-crawlerdb}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-crawler}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-crawler1234}
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"

  # ──────────────────────────────────────────────
  # 4. React Frontend (어드민 대시보드)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crawler-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  db_data:
    driver: local
